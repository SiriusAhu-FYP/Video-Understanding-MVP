[general]
experiment_name = "multi_model_benchmark"
timestamp_format = "%Y-%m-%d_%H-%M-%S"

[models]
list = [
    "Qwen/Qwen3.5-2B",
    "Qwen/Qwen3.5-0.8B",
    "Qwen/Qwen3-VL-2B-Instruct",
    "OpenGVLab/InternVL2_5-2B",
    "Zero-Point-AI/MARTHA-2B",
    "mistralai/Ministral-3-3B-Instruct-2512",
    "deepseek-ai/deepseek-vl2-tiny",
    "vikhyatk/moondream2",
]

[vllm]
base_url = "http://localhost:8000/v1"
gpu_memory_utilization = 0.5
max_model_len = 8192
startup_timeout_s = 300
poll_interval_s = 15

[benchmark_speed]
enabled = true
runs = 3
warmup = 1
scenarios = ["short_desc", "detailed_desc", "object_detection", "action_analysis", "ui_recognition"]
images = "all"

[video_understanding]
enabled = true
runs = 3
videos = "all"
