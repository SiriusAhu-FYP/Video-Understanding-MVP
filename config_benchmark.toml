[general]
experiment_name = "multi_model_benchmark"
output_dir = "results/v3"
timestamp_format = "%Y-%m-%d_%H-%M-%S"

[models]
list = [
    # "Qwen/Qwen3.5-2B",
    # "Qwen/Qwen3.5-0.8B",
    "Qwen/Qwen3-VL-2B-Instruct",
    "OpenGVLab/InternVL2_5-2B",
    # "microsoft/Phi-3.5-vision-instruct",
    # "mistralai/Ministral-3-3B-Instruct-2512",
    "deepseek-ai/deepseek-vl2-tiny",
    "HuggingFaceTB/SmolVLM2-2.2B-Instruct",
]

[vllm]
base_url = "http://localhost:8000/v1"
gpu_memory_utilization = 0.7
startup_timeout_s = 300
poll_interval_s = 15

# ── Preflight / Validation ───────────────────────────────────────

[preflight]
enabled = true
health_check = true
vision_check = true
max_retries = 3
retry_delay_s = 10

[preflight.gpu_probe]
enabled = true
candidates = [0.45]  # 0.00 - 1.00
timeout_s = 120
enforce_eager = true

# ── Experiments ──────────────────────────────────────────────────
#
# Each experiment has its own section with an `enabled` field.
# Set `enabled = false` to skip an experiment.

[experiments.benchmark_speed]
enabled = true
runs = 5
warmup = 1
scenarios = [
    "short_desc",
    "detailed_desc",
    "object_detection",
    "action_analysis",
    "ui_recognition",
]

[experiments.benchmark_quality]
enabled = true
runs = 5
judge_delay_s = 1.0

[experiments.video_understanding]
enabled = true
runs = 5

# ── Report Generation ────────────────────────────────────────────

[reporting]
use_deepseek = true
language = "中文"
deepseek_model = "deepseek-chat"
max_tokens_per_section = 1024
temperature = 0.3
