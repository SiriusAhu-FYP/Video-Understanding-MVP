[general]
experiment_name = "multi_model_benchmark"
timestamp_format = "%Y-%m-%d_%H-%M-%S"

[models]
list = [
    "Qwen/Qwen3.5-2B",
    "Qwen/Qwen3.5-0.8B",
    "Qwen/Qwen3-VL-2B-Instruct",
    "OpenGVLab/InternVL2_5-2B",
    "microsoft/Phi-3.5-vision-instruct",
    "mistralai/Ministral-3-3B-Instruct-2512",
    "deepseek-ai/deepseek-vl2-tiny",
    "HuggingFaceTB/SmolVLM2-2.2B-Instruct",
]

[vllm]
base_url = "http://localhost:8000/v1"
gpu_memory_utilization = 0.7
max_model_len = 4096
startup_timeout_s = 300
poll_interval_s = 15

[benchmark_speed]
enabled = true
runs = 5
warmup = 1
scenarios = ["short_desc", "detailed_desc", "object_detection", "action_analysis", "ui_recognition"]
images = "all"

[benchmark_quality]
enabled = true
runs = 5
judge_delay_s = 1.0

[video_understanding]
enabled = true
runs = 5
videos = "all"
